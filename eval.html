<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bryte AI — Eval Testing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f5f5;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    .sidebar {
      width: 340px;
      min-width: 340px;
      background: #fff;
      border-right: 1px solid rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 16px 16px 12px;
      border-bottom: 1px solid rgba(0,0,0,0.06);
      flex-shrink: 0;
    }

    .sidebar-header-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .sidebar-header h1 {
      font-size: 16px;
      font-weight: 700;
      color: rgba(0,0,0,0.87);
    }

    .sidebar-header .back-link {
      margin-left: auto;
      font-size: 11px;
      color: #30258D;
      text-decoration: none;
      font-weight: 600;
    }
    .sidebar-header .back-link:hover { text-decoration: underline; }

    .new-session-btn {
      width: 100%;
      padding: 9px 14px;
      background: #30258D;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 6px;
      justify-content: center;
      transition: background 0.15s;
      margin-bottom: 10px;
    }
    .new-session-btn:hover { background: #3E30B7; }

    .search-box {
      width: 100%;
      padding: 8px 12px;
      border: 1.5px solid rgba(48,37,141,0.18);
      border-radius: 8px;
      font-size: 12.5px;
      outline: none;
      font-family: inherit;
      color: rgba(0,0,0,0.87);
    }
    .search-box:focus { border-color: #30258D; }
    .search-box::placeholder { color: rgba(0,0,0,0.32); }

    .sidebar-stats {
      display: flex;
      gap: 8px;
      padding: 8px 16px;
      border-bottom: 1px solid rgba(0,0,0,0.06);
      flex-shrink: 0;
    }

    .stat-pill {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 100px;
      cursor: pointer;
      transition: all 0.12s;
    }
    .stat-pill.all { background: rgba(0,0,0,0.06); color: rgba(0,0,0,0.6); }
    .stat-pill.pass { background: rgba(34,197,94,0.1); color: #15803d; }
    .stat-pill.fail { background: rgba(239,68,68,0.08); color: #b91c1c; }
    .stat-pill.untested { background: rgba(234,179,8,0.1); color: #854d0e; }
    .stat-pill.active { outline: 2px solid #30258D; outline-offset: 1px; }

    .sidebar-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }
    .sidebar-list::-webkit-scrollbar { width: 4px; }
    .sidebar-list::-webkit-scrollbar-thumb { background: rgba(48,37,141,0.12); border-radius: 2px; }

    .scorecard-group {
      margin-bottom: 2px;
    }

    .scorecard-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: rgba(0,0,0,0.45);
      cursor: pointer;
      user-select: none;
      transition: background 0.12s;
    }
    .scorecard-header:hover { background: rgba(0,0,0,0.02); }
    .scorecard-header .chevron {
      font-style: normal;
      font-size: 10px;
      transition: transform 0.2s;
    }
    .scorecard-header.collapsed .chevron { transform: rotate(-90deg); }
    .scorecard-header .count {
      margin-left: auto;
      font-size: 10px;
      font-weight: 600;
      color: rgba(0,0,0,0.3);
    }

    .scorecard-items {
      display: block;
    }
    .scorecard-items.collapsed { display: none; }

    .use-case-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 16px 8px 24px;
      cursor: pointer;
      transition: background 0.1s;
      border-left: 3px solid transparent;
    }
    .use-case-item:hover { background: rgba(48,37,141,0.03); }
    .use-case-item.selected {
      background: rgba(48,37,141,0.06);
      border-left-color: #30258D;
    }

    .uc-status {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 700;
    }
    .uc-status.untested { background: rgba(0,0,0,0.06); color: rgba(0,0,0,0.3); }
    .uc-status.pass { background: rgba(34,197,94,0.15); color: #15803d; }
    .uc-status.fail { background: rgba(239,68,68,0.12); color: #b91c1c; }

    .uc-info {
      flex: 1;
      min-width: 0;
    }

    .uc-title-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .uc-id {
      font-size: 10.5px;
      font-weight: 700;
      color: #30258D;
      flex-shrink: 0;
    }

    .uc-title {
      font-size: 12.5px;
      font-weight: 600;
      color: rgba(0,0,0,0.8);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .uc-preview {
      font-size: 11px;
      color: rgba(0,0,0,0.4);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .uc-status-tag {
      font-size: 9px;
      font-weight: 600;
      padding: 1px 5px;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .uc-status-tag.needs-investigation { background: rgba(234,179,8,0.12); color: #854d0e; }
    .uc-status-tag.pending { background: rgba(0,0,0,0.06); color: rgba(0,0,0,0.45); }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: rgba(0,0,0,0.3);
      gap: 12px;
    }
    .empty-state svg { opacity: 0.3; }
    .empty-state p { font-size: 14px; font-weight: 500; }

    .test-page {
      flex: 1;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }
    .test-page.active { display: flex; }

    .test-header {
      padding: 16px 24px;
      border-bottom: 1px solid rgba(0,0,0,0.06);
      background: #fff;
      flex-shrink: 0;
    }

    .test-header-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .test-header .test-id {
      font-size: 12px;
      font-weight: 700;
      color: #30258D;
    }

    .test-header .test-title {
      font-size: 18px;
      font-weight: 700;
      color: rgba(0,0,0,0.87);
    }

    .test-header .test-scorecard {
      font-size: 11px;
      font-weight: 600;
      color: rgba(0,0,0,0.4);
      margin-left: auto;
    }

    .test-meta {
      display: flex;
      gap: 8px;
      margin-top: 6px;
      flex-wrap: wrap;
    }

    .meta-tag {
      font-size: 10.5px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 100px;
      border: 1px solid;
    }
    .meta-tag.type { background: rgba(48,37,141,0.06); border-color: rgba(48,37,141,0.18); color: #30258D; }
    .meta-tag.status-active { background: rgba(34,197,94,0.08); border-color: rgba(34,197,94,0.25); color: #15803d; }
    .meta-tag.status-needs-investigation { background: rgba(234,179,8,0.1); border-color: rgba(234,179,8,0.3); color: #854d0e; }
    .meta-tag.status-pending { background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.1); color: rgba(0,0,0,0.45); }
    .meta-tag.rule { background: rgba(239,68,68,0.06); border-color: rgba(239,68,68,0.2); color: #b91c1c; }

    .test-body {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    .test-details {
      width: 360px;
      min-width: 360px;
      border-right: 1px solid rgba(0,0,0,0.06);
      overflow-y: auto;
      padding: 16px 20px;
      background: #fafafa;
    }
    .test-details::-webkit-scrollbar { width: 4px; }
    .test-details::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 2px; }

    .detail-section {
      margin-bottom: 16px;
    }

    .detail-section h3 {
      font-size: 10.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: rgba(0,0,0,0.4);
      margin-bottom: 6px;
    }

    .detail-section .prompt-text {
      background: rgba(48,37,141,0.06);
      border: 1px solid rgba(48,37,141,0.12);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.5;
      color: rgba(0,0,0,0.8);
      cursor: pointer;
      transition: border-color 0.12s;
    }
    .detail-section .prompt-text:hover { border-color: rgba(48,37,141,0.3); }
    .detail-section .prompt-text::after {
      content: 'Click to send';
      display: block;
      font-size: 10px;
      color: #30258D;
      font-weight: 600;
      margin-top: 6px;
    }

    .detail-section p,
    .detail-section li {
      font-size: 12.5px;
      line-height: 1.55;
      color: rgba(0,0,0,0.65);
    }

    .detail-section ul {
      padding-left: 16px;
    }
    .detail-section li { margin-bottom: 3px; }

    .detail-section .notes-box {
      background: rgba(234,179,8,0.08);
      border: 1px solid rgba(234,179,8,0.2);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 12px;
      color: #854d0e;
      line-height: 1.5;
    }

    .test-chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-panel-eval {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: linear-gradient(135deg, rgba(109,170,242,0.03) 0%, rgba(95,36,159,0.03) 75%), #fff;
    }

    .chat-header-eval {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(0,0,0,0.06);
      flex-shrink: 0;
      background: #fff;
    }
    .chat-header-eval h2 { font-size: 14px; font-weight: 600; color: rgba(0,0,0,0.87); }
    .chat-header-eval p { font-size: 11px; color: rgba(0,0,0,0.4); margin-top: 1px; }

    .verdict-buttons {
      margin-left: auto;
      display: flex;
      gap: 6px;
    }

    .verdict-btn {
      padding: 5px 14px;
      border-radius: 100px;
      font-size: 11.5px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.12s;
      font-family: inherit;
    }

    .verdict-btn.pass-btn {
      background: rgba(34,197,94,0.08);
      border: 1.5px solid rgba(34,197,94,0.3);
      color: #15803d;
    }
    .verdict-btn.pass-btn:hover { background: rgba(34,197,94,0.15); }
    .verdict-btn.pass-btn.active { background: #15803d; color: white; border-color: #15803d; }

    .verdict-btn.fail-btn {
      background: rgba(239,68,68,0.06);
      border: 1.5px solid rgba(239,68,68,0.25);
      color: #b91c1c;
    }
    .verdict-btn.fail-btn:hover { background: rgba(239,68,68,0.12); }
    .verdict-btn.fail-btn.active { background: #b91c1c; color: white; border-color: #b91c1c; }

    .messages-eval {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .messages-eval::-webkit-scrollbar { width: 4px; }
    .messages-eval::-webkit-scrollbar-thumb { background: rgba(48,37,141,0.12); border-radius: 2px; }

    .msg { display: flex; align-items: flex-start; gap: 8px; }
    .msg.user { flex-direction: row-reverse; }

    .bryte-avatar { width: 26px; height: 26px; flex-shrink: 0; margin-top: 2px; }

    .user-avatar {
      width: 26px; height: 26px;
      border-radius: 50%;
      background: rgba(48,37,141,0.1);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; color: #222;
      flex-shrink: 0; margin-top: 2px;
    }

    .bubble {
      max-width: 82%;
      padding: 9px 13px;
      border-radius: 14px;
      font-size: 13.5px;
      line-height: 1.55;
      color: rgba(0,0,0,0.87);
    }
    .msg.bryte .bubble {
      background: white;
      border: 1px solid rgba(0,0,0,0.08);
      border-top-left-radius: 3px;
    }
    .msg.user .bubble {
      background: rgba(48,37,141,0.08);
      color: white;
      background: linear-gradient(135deg, #6DAAF2 0%, #5F249F 75%);
      border-top-right-radius: 3px;
    }

    .typing-bubble {
      display: flex; align-items: center; gap: 4px;
      padding: 13px 16px;
    }
    .dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: rgba(48,37,141,0.3);
      animation: bounce 1.1s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.18s; }
    .dot:nth-child(3) { animation-delay: 0.36s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    .input-area-eval {
      padding: 8px 12px;
      border-top: 1px solid rgba(0,0,0,0.06);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      background: #fff;
    }

    .chat-input-eval {
      flex: 1;
      padding: 9px 15px;
      border-radius: 100px;
      font-size: 13.5px;
      outline: none;
      color: rgba(0,0,0,0.87);
      border: 1.5px solid transparent;
      background-image: linear-gradient(white, white),
        linear-gradient(135deg, rgba(239,149,14,0.4) 15%, rgba(238,39,114,0.4) 50%, rgba(79,65,187,0.4) 85%);
      background-origin: border-box;
      background-clip: padding-box, border-box;
      font-family: inherit;
    }
    .chat-input-eval::placeholder { color: rgba(0,0,0,0.32); }

    .send-btn-eval {
      width: 34px; height: 34px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #6DAAF2 0%, #5F249F 75%);
      color: white;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }
    .send-btn-eval:hover { opacity: 0.88; }
    .send-btn-eval:disabled { opacity: 0.35; cursor: default; }

    .routing-tag-eval {
      font-size: 10.5px;
      color: #222;
      background: rgba(48,37,141,0.07);
      border: 1px solid rgba(48,37,141,0.15);
      border-radius: 100px;
      padding: 3px 10px;
      width: fit-content;
      margin: 0 auto;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    .bryte-form {
      background: rgba(48,37,141,0.03);
      border: 1px solid rgba(48,37,141,0.18);
      border-radius: 12px;
      padding: 16px;
      margin: 4px 0;
    }
    .bryte-form-title {
      font-size: 13px;
      font-weight: 700;
      color: rgba(0,0,0,0.87);
      margin-bottom: 12px;
    }
    .bryte-form-field { margin-bottom: 10px; }
    .bryte-form label {
      display: block;
      font-size: 11.5px;
      font-weight: 600;
      color: rgba(0,0,0,0.55);
      margin-bottom: 4px;
    }
    .bryte-form input[type="text"],
    .bryte-form input[type="number"],
    .bryte-form select {
      width: 100%;
      padding: 8px 11px;
      border: 1.5px solid rgba(48,37,141,0.22);
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      color: rgba(0,0,0,0.87);
      background: white;
      outline: none;
    }
    .bryte-form input:focus,
    .bryte-form select:focus { border-color: #30258D; }
    .bryte-form-submit {
      margin-top: 14px;
      width: 100%;
      padding: 10px;
      background: #30258D;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
    }
    .bryte-form-submit:hover { background: #3E30B7; }

    .alt-prompts {
      margin-top: 6px;
    }
    .alt-prompt {
      background: rgba(48,37,141,0.04);
      border: 1px solid rgba(48,37,141,0.08);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 12px;
      color: rgba(0,0,0,0.6);
      cursor: pointer;
      margin-top: 4px;
      transition: border-color 0.12s;
    }
    .alt-prompt:hover { border-color: rgba(48,37,141,0.25); }
  </style>
</head>
<body>

    <div class="sidebar-header">
      <div class="sidebar-header-top">

    async function callGemini(messages, systemPrompt, jsonMode = false, _retryAttempt = 0) {
      const contents = messages.map(m => ({
        role: m.role === 'assistant' ? 'model' : 'user',
        parts: [{ text: m.content }]
      }));

      const body = {
        system_instruction: { parts: [{ text: getCurrentDateContext() + '\n\n' + systemPrompt }] },
        contents,
        safetySettings: [
          { category: 'HARM_CATEGORY_HARASSMENT', threshold: 'BLOCK_NONE' },
          { category: 'HARM_CATEGORY_HATE_SPEECH', threshold: 'BLOCK_NONE' },
          { category: 'HARM_CATEGORY_SEXUALLY_EXPLICIT', threshold: 'BLOCK_NONE' },
          { category: 'HARM_CATEGORY_DANGEROUS_CONTENT', threshold: 'BLOCK_NONE' }
        ],
        toolConfig: { function_calling_config: { mode: 'NONE' } },
        generationConfig: {
          temperature: jsonMode ? 0 : 0.7,
          maxOutputTokens: jsonMode ? 800 : 8192,
          ...(jsonMode && { responseMimeType: 'application/json' })
        }
      };

      const res = await fetch('/api/gemini', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ body, model: 'gemini-2.5-flash' })
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error?.message || 'API error');
      }

      const data = await res.json();
      const candidate = data.candidates?.[0];
      const parts = candidate?.content?.parts || [];
      const text = parts.map(p => p.text).filter(Boolean).join('');
      if (!text) {
        const reason = candidate?.finishReason || 'unknown';
        if (reason === 'UNEXPECTED_TOOL_CALL' && _retryAttempt < 1) {
          return await callGemini(messages, systemPrompt, jsonMode, _retryAttempt + 1);
        }
        throw new Error(`Response blocked or empty (reason: ${reason})`);
      }
      return text;
    }

    async function sendEvalMessage() {
      const input = document.getElementById('evalInput');
      const text = input.value.trim();
      if (!text) return;

      input.value = '';
      appendMsg('user', text);
      chatHistory.push({ role: 'user', content: text });

      const typingId = showTyping();
      setInputDisabled(true);

      try {
        const orchestratorPrompt = ORCHESTRATOR_PROMPT + '\n\n' + includes.orchestratorRules;

        let agentKey = null;
        let orchestratorTextReply = null;

        try {
          const routingRaw = await callGemini(chatHistory, orchestratorPrompt, true);
          const routing = JSON.parse(routingRaw.replace(/```json|```/g, '').trim());
          if (routing.type === 'AGENT') {
            const baseName = (routing.response || '').split(':')[0];
            agentKey = AGENT_NAME_MAP[baseName] || null;
            if (!agentKey) {
              console.warn('Routing returned unknown agent:', routing.response);
              showRoutingTag('Routing: unknown agent "' + (routing.response || '') + '"');
            }
          } else if (routing.type === 'TEXT') {
            orchestratorTextReply = routing.response;
          }
        } catch(e) {
          console.warn('Routing parse error:', e.message);
          showRoutingTag('Routing parse error — falling back to direct');
        }

        let reply;
        if (agentKey && MOCK_AGENTS[agentKey]) {
          const mock = MOCK_AGENTS[agentKey];
          showRoutingTag(`Orchestrator → ${mock.name} Agent`);
          const specAddOn = '\n\n' + includes.agentBehavior +
            (WRITE_CAPABLE_AGENTS.has(agentKey) ? '\n\n' + includes.writeActions : '');
          const agentPrompt = AGENT_BASE_PROMPT +
            `\n\n--- AGENT DATA ---\n${mock.data}` + specAddOn;
          reply = await callGemini(chatHistory, agentPrompt);
        } else if (orchestratorTextReply) {
          showRoutingTag('Orchestrator → direct');
          reply = orchestratorTextReply;
        } else {
          showRoutingTag('Orchestrator → direct');
          const directPrompt = DIRECT_PROMPT + '\n\n' + includes.agentBehavior;
          reply = await callGemini(chatHistory, directPrompt);
        }

        removeTyping(typingId);
        appendMsg('bryte', reply);
        chatHistory.push({ role: 'assistant', content: reply });

        removeTyping(typingId);
        appendMsg('bryte', 'API error: ' + err.message);
      }

      setInputDisabled(false);
      document.getElementById('evalInput').focus();
    }

    function renderMarkdown(text) {
      const lines = text.split('\n');
      let html = '';
      let tableRows = [];
      let inFormBlock = false;
      let formLines = [];

      function flushTable() {
        if (!tableRows.length) return;
        const headers = tableRows[0].split('|').map(c => c.trim()).filter(c => c);
        const body = tableRows.slice(2);
        let t = '<table style="border-collapse:collapse;font-size:13px;margin:6px 0;width:100%"><thead><tr>';
        headers.forEach(h => {
          t += `<th style="border:1px solid rgba(0,0,0,0.12);padding:5px 8px;background:rgba(48,37,141,0.06);text-align:left;font-weight:600">${h}</th>`;
        });
        t += '</tr></thead><tbody>';
        body.forEach(row => {
          const cells = row.split('|').map(c => c.trim()).filter(c => c);
          if (!cells.length) return;
          t += '<tr>';
          cells.forEach(cell => {
            t += `<td style="border:1px solid rgba(0,0,0,0.1);padding:5px 8px">${inlineFormat(cell)}</td>`;
          });
          t += '</tr>';
        });
        t += '</tbody></table>';
        html += t;
        tableRows = [];
      }

      function inlineFormat(s) {
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
          .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
          .replace(/\*(.+?)\*/g,'<em>$1</em>');
      }

      let bulletNum = 0;
      lines.forEach(line => {
        if (line.trim() === '```form') { inFormBlock = true; formLines = []; return; }
        if (inFormBlock) {
          if (line.trim() === '```') {
            inFormBlock = false;
            try {
              const formDef = JSON.parse(formLines.join('\n'));
              html += renderBryteForm(formDef);
            } catch(e) { html += '<div style="color:red;font-size:12px">Form render error</div>'; }
            formLines = [];
          } else { formLines.push(line); }
          return;
        }
        if (line.trim().startsWith('|')) { tableRows.push(line); return; }
        if (tableRows.length) flushTable();
        const safe = inlineFormat(line);
        if (/^\*\*[^*]+\*\*\s*$/.test(line.trim())) {
          bulletNum = 0;
          const subtitleText = inlineFormat(line.trim().replace(/^\*\*|\*\*$/g, ''));
          html += `<div style="margin:12px 0 3px 0;font-size:13px;font-weight:800;color:rgba(0,0,0,0.88)">${subtitleText}</div>`;
        } else if (/^\d+\.\s/.test(line.trim())) {
          bulletNum = 0;
          html += `<div style="margin:6px 0;padding-left:4px">${safe}</div>`;
        } else if (/^[-•]\s/.test(line.trim())) {
          bulletNum++;
          html += `<div style="margin:6px 0;padding-left:4px">${bulletNum}. ${safe.replace(/^[-•]\s/,'')}</div>`;
        } else if (line.trim() === '') {
          bulletNum = 0;
          html += '<div style="height:8px"></div>';
        } else {
          bulletNum = 0;
          html += `<div style="margin:3px 0">${safe}</div>`;
        }
      });
      if (tableRows.length) flushTable();
      return html;
    }

    function renderBryteForm(formDef) {
      const formId = formDef.formId || ('bryte-form-' + Date.now());
      let html = `<form class="bryte-form" id="${formId}">`;
      if (formDef.title) html += `<div class="bryte-form-title">${escapeHtml(formDef.title)}</div>`;
      (formDef.fields || []).forEach(field => {
        html += `<div class="bryte-form-field">`;
        const opt = field.required === false ? ' <span style="font-weight:400;color:rgba(0,0,0,0.38)">(optional)</span>' : '';
        html += `<label for="${formId}-${field.id}">${escapeHtml(field.label)}${opt}</label>`;
        if (field.type === 'select') {
          html += `<select id="${formId}-${field.id}" name="${field.id}">`;
          (field.options || []).forEach(o => {
            const sel = field.default === o ? ' selected' : '';
            html += `<option value="${escapeHtml(o)}"${sel}>${escapeHtml(o)}</option>`;
          });
          html += '</select>';
        } else {
          const val = field.default ? ` value="${escapeAttr(field.default)}"` : '';
          html += `<input type="text" id="${formId}-${field.id}" name="${field.id}"${val} autocomplete="off"/>`;
        }
        html += '</div>';
      });
      const label = escapeHtml(formDef.submitLabel || 'Submit');
      html += `<button type="button" class="bryte-form-submit" onclick="submitBryteForm('${formId}')">${label}</button></form>`;
      return html;
    }

    function submitBryteForm(formId) {
      const form = document.getElementById(formId);
      if (!form) return;
      const parts = [];
      form.querySelectorAll('input, select').forEach(f => {
        if (!f.name || !f.value.trim()) return;
        const lbl = form.querySelector(`label[for="${formId}-${f.name}"]`);
        const labelText = lbl ? lbl.textContent.replace('(optional)', '').trim() : f.name;
        parts.push(`${labelText}: ${f.value.trim()}`);
      });
      if (!parts.length) return;
      form.querySelectorAll('input, select, button').forEach(el => el.disabled = true);
      const btn = form.querySelector('.bryte-form-submit');
      if (btn) btn.textContent = 'Submitted';
      document.getElementById('evalInput').value = parts.join(' | ');
      sendEvalMessage();
    }
